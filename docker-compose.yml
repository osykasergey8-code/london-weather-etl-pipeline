services:
  # Container B: Streamlit dashboard - reads the same SQLite file the DAG writes to
  dashboard:
    build: ./dashboard
    volumes:
      - ./dashboard:/app
      - ./data:/app/data
    working_dir: /app
    environment:
      - DB_PATH=/app/data/weather.db
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
